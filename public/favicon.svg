  <circle cx="16" cy="16" r="15" fill="#d4a030"/>
  <!-- Bird body — a simple stylized bird in flight -->
  <path d="M8 18 Q12 11 18 12 Q21 12.5 22 14 Q23 16 21 17 Q18 18 14 17.5 L11 21" fill="white" fill-opacity="0.95"/>
  <!-- Wing detail -->
